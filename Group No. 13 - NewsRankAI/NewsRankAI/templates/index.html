<!DOCTYPE html>
<html>
<head>
    <title>NewsRankAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            padding: 60px 50px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            width: 600px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 34px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .category-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            outline: none;
            resize: none;
            font-size: 14px;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.9);
            color: black;
        }

        button {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            border: none;
            padding: 12px 35px;
            border-radius: 30px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 198, 255, 0.4);
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.6;
        }

    </style>
</head>

<body>
    <div class="container">
        <h1>📰 NewsRankAI</h1>
        <div class="subtitle">
            Smart Machine Learning based news category prediction system
        </div>

        <div class="categories">
            <div class="category-badge">Politics</div>
            <div class="category-badge">Sports</div>
            <div class="category-badge">Business</div>
            <div class="category-badge">Technology</div>
        </div>

        <form action="/predict" method="POST">
            <textarea name="news" placeholder="Enter your news headline here..." required></textarea>
            <button type="submit">Classify Now</button>
        </form>

        <div class="footer">
            Where news meet Insight
        </div>
    </div>
</body>
</html>
